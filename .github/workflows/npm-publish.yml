name: npm publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup latest npm
        run: |
          npm install -g npm@latest
          npm --version
          node --version

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Publish to npm (Trusted Publishing)
        run: npm publish --access public
